<header
     class="flex shadow-[0px_4px_16px_rgba(17,_17,_26,_0.1),_0px_8px_32px_rgba(17,_17,_26,_0.05)] py-3 px-4 sm:px-6 bg-white font-[sans-serif] min-h-[75px] tracking-wide relative z-50 overflow-visible">
    <div class="flex items-center justify-between w-full px-6">
        <a [routerLink]="['/']">
            <img src="./images/smvLogo.jpg" class="w-36" />
        </a>

        <!-- btn abrr-->
        <button (click)="toggleMenu()" class="lg:hidden ml-auto">
            <svg *ngIf="!isMenuOpen" class="w-7 h-7" fill="#333" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd"
                    d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"
                    clip-rule="evenodd"></path>
            </svg>
            <svg *ngIf="isMenuOpen" class="w-7 h-7" fill="#333" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd"
                    d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                    clip-rule="evenodd"></path>
            </svg>
        </button>

        <div class="fixed inset-0 bg-black/50 lg:static lg:bg-transparent lg:block transition-all duration-300 ease-in-out {{ isMenuOpen ? 'opacity-100 visible' : 'opacity-0 invisible' }}
                    lg:opacity-100 lg:visible overflow-visible">
            <div class="bg-white w-3/4 max-w-md h-full ml-auto p-6 transform transition-transform duration-300 ease-in-out lg:transform-none lg:p-0 lg:w-auto lg:h-auto lg:bg-transparent
                {{ isMenuOpen ? 'translate-x-0' : 'translate-x-full' }} lg:translate-x-0">
                <button (click)="toggleMenu()" class="absolute top-4 right-4 lg:hidden">
                    <svg class="w-6 h-6" fill="#333" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd"
                            d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                            clip-rule="evenodd"></path>
                    </svg>
                </button>

                <ul class="space-y-4 mt-8 lg:space-y-0 lg:mt-0 lg:flex lg:items-center lg:gap-1 xl:gap-6 ml-4">
 
  <li class="relative lg:inline-block group">


    <!-- Equipos -->
  <span
    class="font-semibold block text-[15px] xl:text-[16px] whitespace-nowrap text-[#333] hover:text-[#6a8c2f] cursor-pointer">
    Equipos
  </span>

  <ul
    class="hidden lg:block lg:absolute lg:left-0 lg:top-full
           lg:bg-white lg:shadow-lg lg:rounded-md
           lg:min-w-[200px]
           lg:opacity-0 lg:invisible
           group-hover:lg:opacity-100 group-hover:lg:visible">

    <li>
      <a [routerLink]="['/mindray']"
         (click)="toggleMenu()"
         class="block px-4 py-2 hover:bg-gray-100">
        Mindray
      </a>
    </li>

    <li>
      <a [routerLink]="['/terason']"
         (click)="toggleMenu()"
         class="block px-4 py-2 hover:bg-gray-100">
        Terason
      </a>
    </li>

    <li>
      <a [routerLink]="['/veterinario']"
         (click)="toggleMenu()"
         class="block px-4 py-2 hover:bg-gray-100">
        Veterinario
      </a>
    </li>

  </ul>

</li>

  <!--<li class="lg:inline-block">
    <a 
      [routerLink]="['/productsVet']" 
      routerLinkActive="text-[#82a537] font-bold" 
      (click)="toggleMenu()"
      class="font-semibold block text-[13px] xl:text-[14px] lg:inline-block whitespace-nowrap hover:text-[#6a8c2f] text-[#333]">
      Equipos Veterinarios 
    </a>
  </li>-->

  <!-- servicios -->
  <li class="lg:inline-block">
    <a 
      [routerLink]="['/services']" 
      routerLinkActive="text-[#82a537] font-bold" 
      (click)="toggleMenu()"
      class="font-semibold block text-[15px] xl:text-[16px] lg:inline-block whitespace-nowrap hover:text-[#6a8c2f] text-[#333]">
      Servicios
    </a>
  </li>

  <!-- Nosotros -->
  <li class="lg:inline-block">
    <a 
      [routerLink]="['/about']" 
      routerLinkActive="text-[#82a537] font-bold" 
      (click)="toggleMenu()"
      class="font-semibold block text-[15px] xl:text-[16px] lg:inline-block whitespace-nowrap hover:text-[#6a8c2f] text-[#333]">
      Nosotros
    </a>
  </li>

<!-- Contacto -->
  <li class="lg:inline-block">
    <a 
      [routerLink]="['/contactUs']" 
      routerLinkActive="text-[#82a537] font-bold" 
      (click)="toggleMenu()"
      class="font-semibold block text-[15px] xl:text-[16px] lg:inline-block whitespace-nowrap hover:text-[#6a8c2f] text-[#333]">
      Contacto
      
    </a>
  </li>
</ul>
            </div>
        </div>
    </div>
</header>
